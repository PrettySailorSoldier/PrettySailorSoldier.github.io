
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
#app{min-height:400px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1.3rem;background:linear-gradient(135deg,#2d1b69 0%,#6b2fa0 50%,#c2185b 100%);border-radius:12px;padding:2.5rem 1rem}
#task-input{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;color:#fff;font-size:14px;padding:8px 14px;width:280px;text-align:center;font-family:'Space Mono',monospace;outline:none}
#task-input::placeholder{color:rgba(255,255,255,0.4)}
#task-input:focus{border-color:rgba(255,255,255,0.6)}
.time-inputs{display:flex;align-items:center;gap:8px}
.time-box{display:flex;flex-direction:column;align-items:center;gap:4px}
.time-box label{font-size:10px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace;letter-spacing:0.08em;text-transform:uppercase}
.time-box input[type=number]{width:64px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.25);border-radius:8px;color:#fff;font-size:28px;font-family:'Space Mono',monospace;font-weight:700;padding:6px 4px;text-align:center;outline:none}
.time-box input[type=number]:focus{border-color:rgba(255,255,255,0.6)}
.time-box input[type=number]::-webkit-inner-spin-button{opacity:0}
.sep{font-size:28px;font-family:'Space Mono',monospace;font-weight:700;color:rgba(255,255,255,0.5);margin-top:14px}
#display{font-family:'Space Mono',monospace;font-size:80px;font-weight:700;color:#fff;letter-spacing:-2px;line-height:1;display:none}
#display.warning{color:#fbbf24}
#display.done{color:#f87171;animation:pulse 0.8s ease-in-out infinite alternate}
@keyframes pulse{from{opacity:1}to{opacity:0.5}}
#task-label{font-family:'Space Mono',monospace;font-size:13px;color:rgba(255,255,255,0.65);display:none;text-align:center;max-width:280px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btns{display:flex;gap:10px}
.btn{padding:10px 28px;border-radius:24px;border:none;font-family:'Space Mono',monospace;font-size:12px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em}
.btn-primary{background:rgba(255,255,255,0.92);color:#2d1b69}
.btn-primary:hover{background:#fff;transform:scale(1.04)}
.btn-secondary{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.btn-secondary:hover{background:rgba(255,255,255,0.22)}
#setup{display:flex;flex-direction:column;align-items:center;gap:1.2rem}
#running{display:none;flex-direction:column;align-items:center;gap:1.2rem}
.tone-section{display:flex;flex-direction:column;align-items:center;gap:8px;width:280px}
.tone-section-label{font-size:10px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace;letter-spacing:0.08em;text-transform:uppercase;align-self:flex-start}
.tone-row{display:flex;gap:6px;flex-wrap:wrap}
.tone-btn{padding:5px 13px;border-radius:16px;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s}
.tone-btn:hover{background:rgba(255,255,255,0.18);color:#fff}
.tone-btn.selected{background:rgba(255,255,255,0.28);color:#fff;border-color:rgba(255,255,255,0.7)}
.upload-row{display:flex;align-items:center;gap:8px;width:100%}
.upload-label{display:flex;align-items:center;gap:6px;padding:5px 13px;border-radius:16px;border:1px dashed rgba(255,255,255,0.35);background:rgba(255,255,255,0.06);color:rgba(255,255,255,0.6);font-family:'Space Mono',monospace;font-size:11px;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.upload-label:hover{background:rgba(255,255,255,0.14);color:#fff;border-color:rgba(255,255,255,0.6)}
.upload-label input{display:none}
#custom-name{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
#notif-status{font-size:10px;color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;text-align:center}
#notif-status a{color:rgba(255,255,255,0.5);cursor:pointer;text-decoration:underline}
</style>

<div id="app">
  <div id="setup">
    <input id="task-input" placeholder="what are you working on? (optional)" maxlength="60">
    <div class="time-inputs">
      <div class="time-box"><label>hr</label><input type="number" id="inp-h" value="0" min="0" max="23"></div>
      <div class="sep">:</div>
      <div class="time-box"><label>min</label><input type="number" id="inp-m" value="25" min="0" max="59"></div>
      <div class="sep">:</div>
      <div class="time-box"><label>sec</label><input type="number" id="inp-s" value="0" min="0" max="59"></div>
    </div>

    <div class="tone-section">
      <div class="tone-section-label">alert tone</div>
      <div class="tone-row">
        <button class="tone-btn selected" data-tone="bell" onclick="selectTone(this)">Bell</button>
        <button class="tone-btn" data-tone="chime" onclick="selectTone(this)">Chime</button>
        <button class="tone-btn" data-tone="digital" onclick="selectTone(this)">Digital</button>
        <button class="tone-btn" data-tone="soft" onclick="selectTone(this)">Soft</button>
        <button class="tone-btn" data-tone="urgent" onclick="selectTone(this)">Urgent</button>
      </div>
      <div class="upload-row">
        <label class="upload-label">
          ＋ upload your own
          <input type="file" id="custom-file" accept="audio/*">
        </label>
        <span id="custom-name">mp3, wav, ogg, m4a…</span>
      </div>
    </div>

    <div id="notif-status"></div>
    <div class="btns">
      <button class="btn btn-primary" id="btn-start">START</button>
    </div>
  </div>

  <div id="running">
    <div id="task-label"></div>
    <div id="display">25:00</div>
    <div class="btns">
      <button class="btn btn-secondary" id="btn-pause">PAUSE</button>
      <button class="btn btn-secondary" id="btn-cancel">CANCEL</button>
    </div>
  </div>
</div>

<script>
const ctx = new (window.AudioContext || window.webkitAudioContext)();
let customBuffer = null;
let selectedTone = 'bell';

const TONES = {
  bell:(c)=>{const t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.setValueAtTime(880,t);o.frequency.exponentialRampToValueAtTime(440,t+1.2);g.gain.setValueAtTime(0.6,t);g.gain.exponentialRampToValueAtTime(0.001,t+1.5);o.start(t);o.stop(t+1.5);},
  chime:(c)=>{[[523,0],[659,0.18],[784,0.36],[1047,0.54]].forEach(([f,d])=>{const t=c.currentTime+d,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=f;g.gain.setValueAtTime(0.4,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.7);o.start(t);o.stop(t+0.7);});},
  digital:(c)=>{[0,0.15,0.3].forEach(d=>{const t=c.currentTime+d,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='square';o.frequency.value=880;g.gain.setValueAtTime(0.3,t);g.gain.setValueAtTime(0,t+0.1);o.start(t);o.stop(t+0.12);});},
  soft:(c)=>{const t=c.currentTime,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sine';o.frequency.value=528;g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(0.4,t+0.3);g.gain.exponentialRampToValueAtTime(0.001,t+2);o.start(t);o.stop(t+2);},
  urgent:(c)=>{[0,0.2,0.4,0.6,0.8].forEach((d,i)=>{const t=c.currentTime+d,o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.type='sawtooth';o.frequency.value=i%2===0?660:880;g.gain.setValueAtTime(0.35,t);g.gain.exponentialRampToValueAtTime(0.001,t+0.15);o.start(t);o.stop(t+0.18);});}
};

function playCustom(){
  if(!customBuffer) return;
  const src=ctx.createBufferSource();
  src.buffer=customBuffer;
  src.connect(ctx.destination);
  src.start();
}

function playTone(){
  ctx.resume().then(()=>{
    if(selectedTone==='custom' && customBuffer) playCustom();
    else if(TONES[selectedTone]) TONES[selectedTone](ctx);
  });
}

function selectTone(btn){
  document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTone=btn.dataset.tone;
  playTone();
}

document.getElementById('custom-file').addEventListener('change', function(){
  const file = this.files[0];
  if(!file) return;
  const nameEl = document.getElementById('custom-name');
  nameEl.textContent = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    ctx.resume().then(()=>{
      ctx.decodeAudioData(e.target.result.slice(0), buf=>{
        customBuffer = buf;
        document.querySelectorAll('.tone-btn').forEach(b=>b.classList.remove('selected'));
        const existing = document.querySelector('.tone-btn[data-tone="custom"]');
        if(existing){ existing.classList.add('selected'); selectedTone='custom'; playTone(); return; }
        const btn = document.createElement('button');
        btn.className='tone-btn selected';
        btn.dataset.tone='custom';
        btn.textContent='Custom';
        btn.onclick=()=>selectTone(btn);
        document.querySelector('.tone-row').appendChild(btn);
        selectedTone='custom';
        playTone();
      }, err=>{ nameEl.textContent='could not decode — try another file'; });
    });
  };
  reader.readAsArrayBuffer(file);
});

let total=0,left=0,running=false,iv=null;
function pad(n){return String(n).padStart(2,'0')}
function fmt(s){const h=Math.floor(s/3600),m=Math.floor((s%3600)/60),sec=s%60;return h>0?`${pad(h)}:${pad(m)}:${pad(sec)}`:`${pad(m)}:${pad(sec)}`;}

function requestNotifPermission(){
  if(!('Notification' in window)){document.getElementById('notif-status').textContent='notifications not supported';return;}
  if(Notification.permission==='granted'){document.getElementById('notif-status').textContent='notifications on';}
  else if(Notification.permission!=='denied'){document.getElementById('notif-status').innerHTML='<a onclick="askNotif()">enable browser notifications</a>';}
  else{document.getElementById('notif-status').textContent='notifications blocked — check browser settings';}
}
function askNotif(){Notification.requestPermission().then(p=>{document.getElementById('notif-status').textContent=p==='granted'?'notifications on':'notifications blocked — check browser settings';});}
function sendNotif(task){if(Notification.permission==='granted'){new Notification("Time's up!",{body:task?`"${task}" is done.`:'Your timer has finished.'});}}

document.getElementById('btn-start').onclick=()=>{
  const h=parseInt(document.getElementById('inp-h').value)||0;
  const m=parseInt(document.getElementById('inp-m').value)||0;
  const s=parseInt(document.getElementById('inp-s').value)||0;
  total=h*3600+m*60+s;
  if(total<=0)return;
  left=total; ctx.resume();
  const task=document.getElementById('task-input').value.trim();
  const lbl=document.getElementById('task-label');
  if(task){lbl.textContent=task;lbl.style.display='block';}else{lbl.style.display='none';}
  document.getElementById('setup').style.display='none';
  document.getElementById('running').style.display='flex';
  tick(); running=true;
  iv=setInterval(()=>{if(running){left--;tick();}},1000);
};

function tick(){
  const d=document.getElementById('display');
  d.style.display='block'; d.textContent=fmt(left);
  const pct=left/total;
  if(left<=0){
    clearInterval(iv); running=false;
    d.textContent='00:00'; d.className='done';
    document.getElementById('btn-pause').textContent='START OVER';
    document.getElementById('btn-cancel').style.display='none';
    playTone();
    sendNotif(document.getElementById('task-label').textContent);
  } else if(pct<=0.2){d.className='warning';}
  else{d.className='';}
}

document.getElementById('btn-pause').onclick=function(){
  if(left<=0){reset();return;}
  if(running){running=false;this.textContent='RESUME';}
  else{running=true;this.textContent='PAUSE';}
};
document.getElementById('btn-cancel').onclick=reset;

function reset(){
  clearInterval(iv);running=false;left=0;
  document.getElementById('display').style.display='none';
  document.getElementById('display').className='';
  document.getElementById('setup').style.display='flex';
  document.getElementById('running').style.display='none';
  document.getElementById('btn-pause').textContent='PAUSE';
  document.getElementById('btn-cancel').style.display='';
}

requestNotifPermission();
</script>
