
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;width:100%;overflow:hidden;background:#000}
#app{position:absolute;inset:0;width:100% !important;height:100% !important;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3rem;background:linear-gradient(135deg,#2d1b69 0%,#6b2fa0 50%,#c2185b 100%);border-radius:0 !important;margin:0 !important;overflow:hidden;z-index:1}
#bg-img{position:absolute;inset:0;background-size:cover;background-position:center;z-index:0;display:none}
#setup,#running,#alerting{position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;gap:1rem}
#running,#alerting{display:none}
#task-input{background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:20px;padding:16px 24px;width:400px;text-align:center;font-family:'Space Mono',monospace;outline:none}
#task-input::placeholder{color:rgba(255,255,255,0.35)}
#task-input:focus{border-color:rgba(255,255,255,0.55)}
.time-inputs{display:flex;align-items:center;gap:6px}
.time-box{display:flex;flex-direction:column;align-items:center;gap:3px}
.time-box label{font-size:9px;color:rgba(255,255,255,0.45);font-family:'Space Mono',monospace;letter-spacing:0.08em;text-transform:uppercase}
.time-box input[type=number]{width:100px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:12px;color:#fff;font-size:48px;font-family:'Space Mono',monospace;font-weight:700;padding:12px 8px;text-align:center;outline:none}
.time-box input[type=number]::-webkit-inner-spin-button{opacity:0}
.sep{font-size:48px;font-family:'Space Mono',monospace;font-weight:700;color:rgba(255,255,255,0.4);margin-top:24px}
.bottom-row{display:flex;align-items:center;gap:10px}
.btn{padding:12px 32px;border-radius:28px;border:none;font-family:'Space Mono',monospace;font-size:14px;font-weight:700;cursor:pointer;transition:all 0.2s;letter-spacing:0.04em}
.btn-primary{background:rgba(255,255,255,0.92);color:#2d1b69}
.btn-primary:hover{background:#fff;transform:scale(1.04)}
.btn-secondary{background:rgba(255,255,255,0.12);color:#fff;border:1px solid rgba(255,255,255,0.3)}
.btn-secondary:hover{background:rgba(255,255,255,0.22)}
.btn-danger{background:rgba(248,113,113,0.2);color:#fca5a5;border:1px solid rgba(248,113,113,0.4)}
.btn-danger:hover{background:rgba(248,113,113,0.35);color:#fff}
.icon-btn{width:40px;height:40px;border-radius:50%;border:1px solid rgba(255,255,255,0.25);background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.7);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;flex-shrink:0}
.icon-btn:hover{background:rgba(255,255,255,0.2);color:#fff;border-color:rgba(255,255,255,0.6)}
#display{font-family:'Space Mono',monospace;font-size:160px;font-weight:700;color:#fff;letter-spacing:-6px;line-height:1;text-shadow:0 8px 32px rgba(0,0,0,0.5)}
#display.warning{color:#fbbf24}
#display.done{color:#f87171}
#task-label{font-family:'Space Mono',monospace;font-size:14px;color:rgba(255,255,255,0.65);text-align:center;max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;text-shadow:0 1px 8px rgba(0,0,0,0.4);display:none}
#notif-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,0.3);flex-shrink:0}
#notif-dot.on{background:#4ade80}
#alert-label{font-family:'Space Mono',monospace;font-size:13px;color:rgba(255,255,255,0.8);text-align:center;animation:pulse 0.8s ease-in-out infinite alternate}
#alert-task{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);text-align:center;max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
@keyframes pulse{from{opacity:1}to{opacity:0.4}}
.snooze-row{display:flex;align-items:center;gap:6px}
.snooze-row label{font-size:10px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace}
.snooze-row input[type=number]{width:44px;background:rgba(255,255,255,0.1);border:1px solid rgba(255,255,255,0.2);border-radius:6px;color:#fff;font-size:13px;font-family:'Space Mono',monospace;font-weight:700;padding:4px;text-align:center;outline:none}
.snooze-row input[type=number]::-webkit-inner-spin-button{opacity:0}

/* overlay */
#overlay{position:absolute;inset:0;z-index:20;display:none;align-items:flex-end;justify-content:center;background:rgba(0,0,0,0.45)}
#overlay.open{display:flex}
#panel{background:#14112a;border-radius:0;width:100%;height:100%;max-width:none;padding:3rem;display:flex;flex-direction:column;gap:2rem;overflow-y:auto}
.panel-header{display:flex;align-items:center;justify-content:space-between}
.panel-title{font-family:'Space Mono',monospace;font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase}
.close-btn{background:none;border:none;color:rgba(255,255,255,0.4);font-size:16px;cursor:pointer;line-height:1;padding:0}
.close-btn:hover{color:#fff}
.p-section{display:flex;flex-direction:column;gap:8px}
.p-label{font-size:9px;color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace;letter-spacing:0.1em;text-transform:uppercase}
.tab-row{display:flex;gap:5px}
.tab-btn{padding:4px 11px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s}
.tab-btn.active{background:rgba(255,255,255,0.18);color:#fff;border-color:rgba(255,255,255,0.5)}
.tab-content{display:none;flex-direction:column;gap:8px}
.tab-content.active{display:flex}
.grad-row{display:flex;align-items:center;gap:8px}
.grad-row label{font-size:10px;color:rgba(255,255,255,0.5);font-family:'Space Mono',monospace;width:44px;flex-shrink:0}
.grad-row input[type=color]{width:32px;height:26px;border-radius:5px;border:1px solid rgba(255,255,255,0.15);background:none;cursor:pointer;padding:2px;flex-shrink:0}
.grad-row input[type=range]{flex:1;accent-color:#a78bfa}
.grad-row span{font-size:10px;color:rgba(255,255,255,0.45);font-family:'Space Mono',monospace;width:30px;text-align:right}
.grad-preview{height:24px;border-radius:6px;width:100%;border:1px solid rgba(255,255,255,0.1)}
.apply-btn{padding:5px 14px;border-radius:12px;border:none;background:rgba(255,255,255,0.15);color:#fff;font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;align-self:flex-start;transition:all 0.2s}
.apply-btn:hover{background:rgba(255,255,255,0.28)}
.upload-row{display:flex;align-items:center;gap:8px}
.upload-label{display:flex;align-items:center;gap:5px;padding:5px 11px;border-radius:12px;border:1px dashed rgba(255,255,255,0.3);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s;white-space:nowrap;flex-shrink:0}
.upload-label:hover{background:rgba(255,255,255,0.12);color:#fff}
.upload-label input{display:none}
.upload-fname{font-family:'Space Mono',monospace;font-size:10px;color:rgba(255,255,255,0.4);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1;min-width:0}
.tone-row{display:flex;gap:5px;flex-wrap:wrap}
.tone-btn{padding:4px 11px;border-radius:12px;border:1px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.05);color:rgba(255,255,255,0.55);font-family:'Space Mono',monospace;font-size:10px;cursor:pointer;transition:all 0.2s}
.tone-btn:hover{background:rgba(255,255,255,0.15);color:#fff}
.tone-btn.selected{background:rgba(255,255,255,0.22);color:#fff;border-color:rgba(255,255,255,0.55)}
</style>

<div id="app">
  <div id="bg-img"></div>

  <div id="setup">
    <input id="task-input" placeholder="what are you working on?" maxlength="60">
    <div class="time-inputs">
      <div class="time-box"><label>hr</label><input type="number" id="inp-h" value="0" min="0" max="23"></div>
      <div class="sep">:</div>
      <div class="time-box"><label>min</label><input type="number" id="inp-m" value="25" min="0" max="59"></div>
      <div class="sep">:</div>
      <div class="time-box"><label>sec</label><input type="number" id="inp-s" value="0" min="0" max="59"></div>
    </div>
    <div class="bottom-row">
      <button class="btn btn-primary" id="btn-start">START</button>
      <button class="icon-btn" id="btn-settings" title="Settings">⚙</button>
      <div id="notif-dot" title="notifications"></div>
    </div>
  </div>

  <div id="running">
    <div id="task-label"></div>
    <div id="display">25:00</div>
    <div class="bottom-row">
      <button class="btn btn-secondary" id="btn-pause">PAUSE</button>
      <button class="btn btn-secondary" id="btn-cancel">CANCEL</button>
    </div>
  </div>

  <div id="alerting">
    <div id="alert-label">time's up</div>
    <div id="alert-task"></div>
    <div class="snooze-row">
      <label>snooze</label>
      <input type="number" id="snooze-min" value="5" min="1" max="60">
      <label>min</label>
    </div>
    <div class="bottom-row">
      <button class="btn btn-secondary" id="btn-snooze">SNOOZE</button>
      <button class="btn btn-danger" id="btn-stop">STOP</button>
    </div>
  </div>

  <div id="overlay">
    <div id="panel">
      <div class="panel-header">
        <span class="panel-title">settings</span>
        <button class="close-btn" id="btn-close">✕</button>
      </div>
      <div class="p-section">
        <div class="p-label">background</div>
        <div class="tab-row">
          <button class="tab-btn active" onclick="switchTab('gradient',this)">Gradient</button>
          <button class="tab-btn" onclick="switchTab('image',this)">Image</button>
        </div>
        <div id="tab-gradient" class="tab-content active">
          <div class="grad-row">
            <label>colors</label>
            <input type="color" id="gc1" value="#2d1b69">
            <input type="color" id="gc2" value="#6b2fa0">
            <input type="color" id="gc3" value="#c2185b">
          </div>
          <div class="grad-row">
            <label>angle</label>
            <input type="range" id="g-angle" min="0" max="360" value="135" oninput="updateGrad()">
            <span id="g-angle-out">135°</span>
          </div>
          <div class="grad-preview" id="grad-preview"></div>
          <button class="apply-btn" onclick="applyGradient()">apply</button>
        </div>
        <div id="tab-image" class="tab-content">
          <div class="upload-row">
            <label class="upload-label">＋ image<input type="file" id="bg-file" accept="image/*"></label>
            <span class="upload-fname" id="bg-name">jpg, png, gif…</span>
          </div>
          <div id="img-controls" style="display:none;flex-direction:column;gap:8px">
            <div class="grad-row"><label>pos x</label><input type="range" id="img-x" min="0" max="100" value="50" oninput="updateImgPos()"><span id="img-x-out">50%</span></div>
            <div class="grad-row"><label>pos y</label><input type="range" id="img-y" min="0" max="100" value="50" oninput="updateImgPos()"><span id="img-y-out">50%</span></div>
            <div class="grad-row"><label>zoom</label><input type="range" id="img-z" min="100" max="300" value="100" oninput="updateImgPos()"><span id="img-z-out">100%</span></div>
            <button class="apply-btn" onclick="clearImg()">remove image</button>
          </div>
        </div>
      </div>
      <div class="p-section">
        <div class="p-label">alert tone</div>
        <div class="tone-row">
          <button class="tone-btn selected" data-tone="bell" onclick="selectTone(this)">Bell</button>
          <button class="tone-btn" data-tone="chime" onclick="selectTone(this)">Chime</button>
          <button class="tone-btn" data-tone="digital" onclick="selectTone(this)">Digital</button>
          <button class="tone-btn" data-tone="soft" onclick="selectTone(this)">Soft</button>
          <button class="tone-btn" data-tone="urgent" onclick="selectTone(this)">Urgent</button>
        </div>
        <div class="upload-row">
          <label class="upload-label">＋ upload<input type="file" id="custom-file" accept="audio/*"></label>
          <span class="upload-fname" id="custom-name">mp3, wav, ogg…</span>
        </div>
      </div>
      <div class="p-section">
        <div class="p-label">notifications</div>
        <button class="apply-btn" onclick="askNotif()">enable browser notifications</button>
        <div id="notif-msg" style="font-size:10px;color:rgba(255,255,255,0.4);font-family:'Space Mono',monospace"></div>
      </div>
    </div>
  </div>
</div>

<script>
function switchTab(name,btn){
  document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  const target = document.getElementById('tab-'+name);
  if(target) target.classList.add('active');
}

function updateGrad(){
  const a = document.getElementById('g-angle')?.value || 135;
  const out = document.getElementById('g-angle-out');
  if(out) out.textContent = a + '°';
  const c1 = document.getElementById('gc1')?.value || '#2d1b69';
  const c2 = document.getElementById('gc2')?.value || '#6b2fa0';
  const c3 = document.getElementById('gc3')?.value || '#c2185b';
  const preview = document.getElementById('grad-preview');
  if(preview) preview.style.background = `linear-gradient(${a}deg,${c1} 0%,${c2} 50%,${c3} 100%)`;
}

function applyGradient(){
  const a = document.getElementById('g-angle')?.value || 135;
  const c1 = document.getElementById('gc1')?.value || '#2d1b69';
  const c2 = document.getElementById('gc2')?.value || '#6b2fa0';
  const c3 = document.getElementById('gc3')?.value || '#c2185b';
  const app = document.getElementById('app');
  if(app) app.style.background = `linear-gradient(${a}deg,${c1} 0%,${c2} 50%,${c3} 100%)`;
  const bgImg = document.getElementById('bg-img');
  if(bgImg) bgImg.style.display = 'none';
}

function updateImgPos(){
  const x = document.getElementById('img-x')?.value || 50;
  const y = document.getElementById('img-y')?.value || 50;
  const z = document.getElementById('img-z')?.value || 100;
  const xOut = document.getElementById('img-x-out');
  const yOut = document.getElementById('img-y-out');
  const zOut = document.getElementById('img-z-out');
  if(xOut) xOut.textContent = x + '%';
  if(yOut) yOut.textContent = y + '%';
  if(zOut) zOut.textContent = z + '%';
  const l = document.getElementById('bg-img');
  if(l){
    l.style.backgroundPosition = `${x}% ${y}%`;
    l.style.backgroundSize = z === '100' ? 'cover' : `${z}%`;
  }
}

function clearImg(){
  const bgImg = document.getElementById('bg-img');
  const ic = document.getElementById('img-controls');
  const bgName = document.getElementById('bg-name');
  const bgFile = document.getElementById('bg-file');
  if(bgImg) bgImg.style.display = 'none';
  if(ic) ic.style.display = 'none';
  if(bgName) bgName.textContent = 'jpg, png, gif…';
  if(bgFile) bgFile.value = '';
}

const actx = new (window.AudioContext || window.webkitAudioContext)();
let customTones = {}, selectedTone = 'bell', alertActive = false, activeNodes = [], total = 0, left = 0, running = false, iv = null;

function stopAudio(){
  alertActive = false;
  activeNodes.forEach(n => { try { n.stop(); } catch(e) {} });
  activeNodes = [];
}

const TONES = {
  bell: (c, cb) => {
    const t = c.currentTime, o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.setValueAtTime(880, t);
    o.frequency.exponentialRampToValueAtTime(440, t + 1.2);
    g.gain.setValueAtTime(0.6, t); g.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
    o.start(t); o.stop(t + 1.5); o.onended = cb;
    activeNodes.push(o);
  },
  chime: (c, cb) => {
    const notes = [[523, 0], [659, 0.18], [784, 0.36], [1047, 0.54]];
    notes.forEach(([f, d], i) => {
      const t = c.currentTime + d, o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sine'; o.frequency.value = f;
      g.gain.setValueAtTime(0.4, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.7);
      o.start(t); o.stop(t + 0.7); activeNodes.push(o);
      if(i === notes.length - 1) o.onended = cb;
    });
  },
  digital: (c, cb) => {
    const beeps = [0, 0.15, 0.3];
    beeps.forEach((d, i) => {
      const t = c.currentTime + d, o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'square'; o.frequency.value = 880;
      g.gain.setValueAtTime(0.3, t); g.gain.setValueAtTime(0, t + 0.1);
      o.start(t); o.stop(t + 0.12); activeNodes.push(o);
      if(i === beeps.length - 1) o.onended = cb;
    });
  },
  soft: (c, cb) => {
    const t = c.currentTime, o = c.createOscillator(), g = c.createGain();
    o.connect(g); g.connect(c.destination);
    o.type = 'sine'; o.frequency.value = 528;
    g.gain.setValueAtTime(0, t); g.gain.linearRampToValueAtTime(0.4, t + 0.3);
    g.gain.exponentialRampToValueAtTime(0.001, t + 2);
    o.start(t); o.stop(t + 2); o.onended = cb;
    activeNodes.push(o);
  },
  urgent: (c, cb) => {
    const pts = [0, 0.2, 0.4, 0.6, 0.8];
    pts.forEach((d, i) => {
      const t = c.currentTime + d, o = c.createOscillator(), g = c.createGain();
      o.connect(g); g.connect(c.destination);
      o.type = 'sawtooth'; o.frequency.value = i % 2 === 0 ? 660 : 880;
      g.gain.setValueAtTime(0.35, t); g.gain.exponentialRampToValueAtTime(0.001, t + 0.15);
      o.start(t); o.stop(t + 0.18); activeNodes.push(o);
      if(i === pts.length - 1) o.onended = cb;
    });
  }
};

function loopTone(){
  if(!alertActive) return;
  if(actx.state === 'suspended'){
    actx.resume().then(() => { if(alertActive) loopTone(); }).catch(e => console.error(e));
    return;
  }
  const playTone = () => {
    if(!alertActive) return;
    if(selectedTone.startsWith('custom-') && customTones[selectedTone]){
      const s = actx.createBufferSource();
      s.buffer = customTones[selectedTone];
      s.connect(actx.destination);
      activeNodes.push(s);
      s.onended = () => {
        activeNodes = activeNodes.filter(n => n !== s);
        if(alertActive) setTimeout(loopTone, 800);
      };
      s.start();
    } else if(TONES[selectedTone]){
      TONES[selectedTone](actx, () => { if(alertActive) setTimeout(loopTone, 800); });
    }
  };
  try { playTone(); } catch(e) { console.error(e); if(alertActive) setTimeout(loopTone, 1000); }
}

function selectTone(btn){
  document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('selected'));
  btn.classList.add('selected');
  selectedTone = btn.dataset.tone;
  actx.resume().then(() => {
    activeNodes.forEach(n => { try { n.stop(); } catch(e) {} });
    activeNodes = [];
    if(selectedTone.startsWith('custom-') && customTones[selectedTone]){
      const s = actx.createBufferSource(); s.buffer = customTones[selectedTone];
      s.connect(actx.destination); s.start(); activeNodes.push(s);
    } else if(TONES[selectedTone]) TONES[selectedTone](actx, () => {});
  });
}

function checkNotif(){
  if(!('Notification' in window)) return;
  const dot = document.getElementById('notif-dot');
  const msg = document.getElementById('notif-msg');
  if(dot) dot.classList.toggle('on', Notification.permission === 'granted');
  if(msg) msg.textContent = Notification.permission === 'granted' ? 'notifications on' : Notification.permission === 'denied' ? 'blocked — check browser settings' : '';
}

function askNotif(){
  Notification.requestPermission().then(() => checkNotif());
}

function pad(n){ return String(n).padStart(2, '0'); }
function fmt(s){
  const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60), sec = s % 60;
  return h > 0 ? `${pad(h)}:${pad(m)}:${pad(sec)}` : `${pad(m)}:${pad(sec)}`;
}

function show(screen){
  ['setup', 'running', 'alerting'].forEach(id => {
    const el = document.getElementById(id);
    if(el) el.style.display = id === screen ? 'flex' : 'none';
  });
}

function tick(){
  const d = document.getElementById('display');
  if(d) d.textContent = fmt(left);
  if(left <= 0){
    if(iv) clearInterval(iv);
    running = false;
    const task = document.getElementById('task-label')?.textContent || '';
    const alertTask = document.getElementById('alert-task');
    if(alertTask){
      alertTask.textContent = task;
      alertTask.style.display = task ? 'block' : 'none';
    }
    show('alerting');
    alertActive = true;
    loopTone();
    if(Notification.permission === 'granted') new Notification("Time's up!", { body: task ? `"${task}" is done.` : 'Your timer has finished.' });
  } else if(left / total <= 0.2){
    if(d) d.className = 'warning';
  } else {
    if(d) d.className = '';
  }
}

// Event Listeners
document.addEventListener('DOMContentLoaded', () => {
  const get = id => document.getElementById(id);

  get('btn-start').onclick = () => {
    const h = parseInt(get('inp-h').value) || 0;
    const m = parseInt(get('inp-m').value) || 0;
    const s = parseInt(get('inp-s').value) || 0;
    total = h * 3600 + m * 60 + s;
    if(total <= 0) return;
    left = total;
    if(iv) clearInterval(iv);
    actx.resume().catch(e => console.warn(e));
    const task = get('task-input').value.trim();
    const lbl = get('task-label');
    if(lbl){
      lbl.textContent = task;
      lbl.style.display = task ? 'block' : 'none';
    }
    show('running');
    tick();
    running = true;
    iv = setInterval(() => { if(running){ left--; tick(); } }, 1000);
  };

  get('btn-settings').onclick = () => get('overlay').classList.add('open');
  get('btn-close').onclick = () => get('overlay').classList.remove('open');
  get('overlay').onclick = function(e){ if(e.target === this) this.classList.remove('open'); };

  get('bg-file').onchange = function(){
    const file = this.files[0];
    if(!file) return;
    get('bg-name').textContent = file.name;
    const reader = new FileReader();
    reader.onload = e => {
      const l = get('bg-img');
      l.style.backgroundImage = `url('${e.target.result}')`;
      l.style.backgroundSize = 'cover';
      l.style.backgroundPosition = '50% 50%';
      l.style.display = 'block';
      get('img-controls').style.display = 'flex';
      ['img-x', 'img-y'].forEach(id => get(id).value = 50);
      get('img-z').value = 100;
      ['img-x-out', 'img-y-out'].forEach(id => get(id).textContent = '50%');
      get('img-z-out').textContent = '100%';
    };
    reader.readAsDataURL(file);
  };

  get('custom-file').onchange = function(){
    const file = this.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = e => {
      actx.resume().then(() => {
        actx.decodeAudioData(e.target.result, buf => {
          const id = 'custom-' + Date.now();
          customTones[id] = buf;
          const btn = document.createElement('button');
          btn.className = 'tone-btn';
          btn.dataset.tone = id;
          btn.textContent = file.name.split('.')[0].substring(0, 10);
          btn.onclick = () => selectTone(btn);
          document.querySelector('.tone-row').appendChild(btn);
          selectTone(btn);
          get('custom-name').textContent = 'added ' + file.name;
        }, () => { get('custom-name').textContent = 'could not decode'; });
      });
    };
    reader.readAsArrayBuffer(file);
  };

  get('btn-snooze').onclick = () => {
    stopAudio();
    const mins = parseInt(get('snooze-min').value) || 5;
    total = mins * 60; left = total;
    get('display').className = '';
    show('running');
    tick();
    running = true;
    iv = setInterval(() => { if(running){ left--; tick(); } }, 1000);
  };

  get('btn-stop').onclick = () => {
    stopAudio();
    show('setup');
    get('display').className = '';
    get('btn-pause').textContent = 'PAUSE';
  };

  get('btn-pause').onclick = function(){
    if(running){ running = false; this.textContent = 'RESUME'; }
    else { running = true; this.textContent = 'PAUSE'; }
  };

  get('btn-cancel').onclick = () => {
    if(iv) clearInterval(iv);
    running = false; left = 0;
    stopAudio();
    get('display').className = '';
    show('setup');
    get('btn-pause').textContent = 'PAUSE';
  };

  ['gc1', 'gc2', 'gc3', 'g-angle'].forEach(id => {
    const el = get(id);
    if(el) el.addEventListener('input', updateGrad);
  });

  updateGrad();
  checkNotif();
  show('setup');
});
</script>
